# entire dashboard in YAML
# REQUIRES https://github.com/thomasloven/lovelace-slider-entity-row (HACS layout-card)

type: masonry
path: test
title: Yamaha Receiver
cards:
  - type: vertical-stack
    cards:
      - square: false
        type: grid
        cards:
          - type: conditional
            conditions:
              - condition: state
                entity: sensor.yamaha_main_status
                state_not: "On"
            card:
              show_name: true
              show_icon: true
              type: button
              icon: mdi:power
              tap_action:
                action: call-service
                service: rest_command.yamaha_main_power
                data:
                  status: "On"
              show_state: false
              icon_height: 35px
              color: light-grey
              name: Power
          - type: conditional
            conditions:
              - condition: state
                entity: sensor.yamaha_main_status
                state: "On"
            card:
              show_name: true
              show_icon: true
              type: button
              icon: mdi:power
              tap_action:
                action: call-service
                service: rest_command.yamaha_main_power
                data:
                  status: Standby
              show_state: false
              color: green
              name: Power
              icon_height: 35px
        columns: 1
      - type: entities
        entities:
          - entity: select.yamaha_source_selector
            name: Source
          - type: custom:slider-entity-row
            entity: input_number.yamaha_volume_slider
            name: " Volume"
            icon: mdi:volume-high
            full_row: true
            update_immediately: true
            step: 0.5
            max: -15
            hide_state: false
            show_icon: true
            hide_when_off: true
            toggle: false
          - entity: select.yamaha_sound_mode
            name: DSP
      - type: conditional
        conditions:
          - condition: state
            entity: select.yamaha_source_selector
            state: TUNER
        card:
          type: entity
          entity: sensor.yamaha_tuner_frequency
          name: Tuner
      - square: false
        type: grid
        columns: 6
        cards:
          - show_name: true
            show_icon: true
            type: button
            icon: mdi:radio-fm
            name: FM
            tap_action:
              action: call-service
              service: rest_command.yamaha_tuner_band
              data:
                band: FM
          - show_name: true
            show_icon: true
            type: button
            icon: mdi:radio-am
            name: AM
            tap_action:
              action: call-service
              service: rest_command.yamaha_tuner_band
              data:
                band: AM
          - show_name: true
            show_icon: true
            type: button
            icon: mdi:minus-box
            name: Seek -
            tap_action:
              action: call-service
              service: rest_command.yamaha_tuner_freq_seek
              data:
                direction: Down
          - type: button
            icon: mdi:plus-box
            name: Seek +
            tap_action:
              action: call-service
              service: rest_command.yamaha_tuner_freq_seek
              data:
                direction: Up
          - show_name: true
            show_icon: true
            type: button
            icon: mdi:skip-previous
            name: Preset -
            tap_action:
              action: call-service
              service: script.yamaha_tuner_preset_down
          - show_name: true
            show_icon: true
            type: button
            icon: mdi:skip-next
            name: Preset +
            tap_action:
              action: call-service
              service: script.yamaha_tuner_preset_up
      - type: grid
        columns: 4
        square: false
        title: Scenes
        cards:
          - show_name: true
            show_icon: true
            type: button
            name: Chromecast Projector
            icon: mdi:projector-screen-outline
            tap_action:
              action: call-service
              service: rest_command.yamaha_main_scene
              data:
                number: "1"
          - show_name: true
            show_icon: true
            type: button
            name: Record Player
            icon: mdi:album
            tap_action:
              action: call-service
              service: rest_command.yamaha_main_scene
              data:
                number: "2"
          - show_name: true
            show_icon: true
            type: button
            name: Bluetooth
            icon: mdi:bluetooth
            tap_action:
              action: call-service
              service: rest_command.yamaha_main_scene
              data:
                number: "3"
          - show_name: true
            show_icon: true
            type: button
            name: Tuner
            icon: mdi:radio
            tap_action:
              action: call-service
              service: rest_command.yamaha_main_scene
              data:
                number: "4"
badges: []
